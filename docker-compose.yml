services:
  postgres:
    image: postgres:16-alpine
    container_name: teste-analitica-postgres
    environment:
      POSTGRES_USER: analitica
      POSTGRES_PASSWORD: analitica
      POSTGRES_DB: fleet_test
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U analitica -d fleet_test']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
